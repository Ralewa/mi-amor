<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>El Viaje Hacia Ti ✨🌷</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;500;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #020005; font-family: 'Montserrat', sans-serif; cursor: crosshair; }
    
    #epic-canvas { display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
    #trail-canvas { display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 500; pointer-events: none; }

    /* ── UI INICIAL (LA PREGUNTA TRAMPA) ── */
    #ui-container {
      position: fixed; inset: 0; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center;
      background: radial-gradient(circle at center, rgba(20,0,10,0.8) 0%, #000 100%); transition: opacity 1.5s ease;
    }
    .glass-panel {
      background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 100, 150, 0.4); border-radius: 20px;
      padding: 40px 30px; width: min(350px, 90vw); text-align: center; box-shadow: 0 0 50px rgba(220, 20, 80, 0.4);
    }
    .glass-panel img {
      width: 100px; height: 100px; border-radius: 50%; border: 3px solid #ff0055; margin-bottom: 15px; object-fit: cover;
    }
    h1 { font-family: 'Cormorant Garamond', serif; color: #fff; font-size: 2.2rem; text-shadow: 0 0 20px #ff0055; margin-bottom: 5px; font-weight: 600;}
    p.sub { color: #ffb3c6; font-size: 1rem; margin-bottom: 25px; line-height: 1.4; }
    
    .botones-container {
      display: flex; justify-content: center; gap: 20px; align-items: center; position: relative; height: 50px;
    }

    /* Botón SÍ */
    #btn-si {
      background: #ff0055; color: #fff; border: 2px solid #ff0055; padding: 12px 35px; border-radius: 50px;
      font-family: 'Montserrat', sans-serif; font-size: 1rem; font-weight: bold; text-transform: uppercase;
      cursor: pointer; transition: all 0.3s; box-shadow: 0 0 20px #ff0055;
    }
    #btn-si:hover { transform: scale(1.1); box-shadow: 0 0 40px #ff0055, inset 0 0 10px #fff; }

    /* Botón NO (El huidizo) */
    #btn-no {
      background: transparent; color: #fff; border: 2px solid #888; padding: 12px 35px; border-radius: 50px;
      font-family: 'Montserrat', sans-serif; font-size: 1rem; font-weight: bold; text-transform: uppercase;
      cursor: pointer; transition: 0.1s linear; z-index: 2000; 
    }

    /* ── TEXTOS CINEMÁTICOS ── */
    #narrativa {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-family: 'Cormorant Garamond', serif; font-size: clamp(28px, 6vw, 45px); color: #fff;
      text-align: center; opacity: 0; z-index: 50; text-shadow: 0 0 30px #ff0055, 0 5px 10px #000;
      transition: opacity 2s ease; pointer-events: none; width: 90%; line-height: 1.2;
    }
    .destaque { color: #ff4d88; font-weight: bold; font-style: italic; }

    /* ── SISTEMA ORBITAL HTML (FOTOS LEGIBLES Y MÁS GRANDES) ── */
    #html-orbit-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; pointer-events: none; }
    
    .floating-photo {
      position: absolute; 
      width: clamp(150px, 22vw, 240px); /* 🔥 Fotos mucho más grandes */
      background: rgba(10, 0, 5, 0.85); /* 🔥 Fondo más oscuro para ultra contraste */
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      padding: 12px; border-radius: 12px; border: 2px solid rgba(255, 100, 150, 0.8);
      color: #fff; text-align: center; opacity: 0; transform: translate(-50%, -50%);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.9), 0 0 20px rgba(255, 0, 85, 0.5); font-family: 'Quicksand', sans-serif;
      transition: opacity 0.5s ease, border 0.3s ease, box-shadow 0.3s ease;
      pointer-events: auto; cursor: pointer; 
    }
    .floating-photo.hovered {
      border: 2px solid #fff; box-shadow: 0 20px 50px rgba(0, 0, 0, 1), 0 0 40px #ff0055, inset 0 0 20px rgba(255,255,255,0.3);
      background: rgba(25, 0, 15, 0.95); z-index: 9999 !important;
    }
    .floating-photo img { 
      width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; margin-bottom: 8px; 
      box-shadow: inset 0 0 10px #000, 0 0 10px rgba(0,0,0,0.5); pointer-events: none;
      filter: brightness(1.1) contrast(1.1); /* 🔥 Colores más vivos en la foto */
    }
    .floating-photo p { 
      font-size: 1.1rem; /* 🔥 Texto más grande */
      font-weight: 700; color: #fff; line-height: 1.2; 
      text-shadow: 2px 2px 4px #000, -2px -2px 4px #000, 0 0 10px #000; pointer-events: none;
    }

    .meteor-word {
      position: absolute; font-family: 'Cormorant Garamond', serif; font-size: clamp(1.8rem, 4vw, 3.5rem);
      font-style: italic; font-weight: bold; color: #fff; opacity: 0; 
      transform: translate(-50%, -50%); 
      text-shadow: 2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 0 0 15px #ff0055, -10px 0 20px #ff0055;
      white-space: nowrap; pointer-events: none; filter: drop-shadow(4px 4px 5px rgba(0,0,0,0.8));
    }

    /* ── CARTA INTERACTIVA ── */
    #btn-recuerdos {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: rgba(255, 0, 85, 0.2); border: 1px solid #ff4d88; color: #fff; padding: 12px 30px; border-radius: 30px;
      backdrop-filter: blur(10px); z-index: 1000; cursor: pointer; display: none; font-family: 'Montserrat', sans-serif;
      font-weight: 600; letter-spacing: 1px; animation: latido 2s infinite; text-transform: uppercase;
    }
    @keyframes latido { 0%, 100% { box-shadow: 0 0 10px rgba(255,0,85,0.4); } 50% { box-shadow: 0 0 25px rgba(255,0,85,0.8); } }

    #galeria-cartas {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
      z-index: 2000; display: none; justify-content: center; align-items: center; flex-direction: column;
      opacity: 0; transition: opacity 0.5s ease;
    }
    .carta-polaroid {
      background: #fdfdfd; padding: 15px 15px 40px 15px; border-radius: 4px;
      width: min(320px, 85vw); transform: rotate(-2deg); box-shadow: 0 15px 35px rgba(0,0,0,0.8); text-align: center; position: relative;
    }
    .carta-polaroid img { width: 100%; aspect-ratio: 1; object-fit: cover; background: #eee; }
    .carta-polaroid p { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; color: #331122; margin-top: 15px; font-weight: 600; }
    #cerrar-carta {
      margin-top: 30px; background: transparent; border: 1px solid #ff4d88; color: #ff4d88;
      padding: 10px 25px; border-radius: 30px; cursor: pointer; font-family: 'Montserrat', sans-serif; font-weight: bold;
    }
  </style>
</head>
<body>

<audio id="musica" loop>
<source src="https://ralewa.github.io/mi-amor/recursos/brillas%20(mp3cut.net).mp3" type="audio/mpeg">
</audio>

<canvas id="epic-canvas"></canvas>
<canvas id="trail-canvas"></canvas> 

<!-- UI DE ENTRADA INTERACTIVA -->
<div id="ui-container">
  <div class="glass-panel">
    <img src="C:\Users\neroy\Desktop\fotitos\portada.jpeg" alt="Perfil">
    <h1>Mi pincesita💘</h1>
    <p class="sub">Tengo una pregunta muy importante para ti...</p>
    <h2 style="color: #ff0055; margin-bottom: 25px; font-family: 'Quicksand', sans-serif;">¿Quieres ser mi universo?</h2>
    <div class="botones-container">
      <button id="btn-si">¡SÍ!</button>
      <button id="btn-no">No</button>
    </div>
  </div>
</div>

<div id="narrativa"></div>
<div id="html-orbit-container"></div>

<button id="btn-recuerdos">Leer una carta 💌</button>
<div id="galeria-cartas">
  <div class="carta-polaroid">
    <img src="C:\Users\neroy\Desktop\fotitos\carta.jpeg" alt="Recuerdo">
    <p>"Sabía que dirías que sí. Tú eres la flor más hermosa y el centro de toda mi galaxia." 🌷💖</p>
  </div>
  <button id="cerrar-carta">Explorar nuestro universo</button>
</div>

<script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// --- DATOS ---
const recuerdosData = [
  { img: "C:\Users\neroy\Desktop\fotitos\sonrisa.jpeg", text: "Tu sonrisa ✨" },
  { img: "https://i.pinimg.com/736x/ec/d7/de/ecd7deca81a95a62bc6d8848dbff1c4f.jpg", text: "El mejor día 💖" },
  { img: "https://i.pinimg.com/736x/b2/82/33/b282337d1eb218e2444c1ee0456184cc.jpg", text: "Tus ojos..." },
  { img: "https://i.pinimg.com/736x/3f/8a/0f/3f8a0ff14ce6cf7dcd2677d242f36f98.jpg", text: "Mi reina" },
  { img: "https://i.pinimg.com/736x/55/aa/5b/55aa5b0d0e6cfbd521ef3c5be88820c7.jpg", text: "Perfecta 🌷" },
  { img: "https://i.pinimg.com/736x/21/df/b8/21dfb858ff85b46b621eb83138378627.jpg", text: "Besito para mas hermoso💕" },
  { img: "https://i.pinimg.com/736x/67/cf/92/67cf92f9d14695079a499d45452d3a33.jpg", text: "Siempre Tú 💕" },
  { img: "https://i.pinimg.com/736x/d6/31/53/d631535ebc1477ed0cbbba886c57fba3.jpg", text: "Mi Destino😍" },
    { img: "https://i.pinimg.com/736x/d6/31/53/d631535ebc1477ed0cbbba886c57fba3.jpg", text: "Mi bebé🥹" }
  { img: "https://i.pinimg.com/736x/d6/31/53/d631535ebc1477ed0cbbba886c57fba3.jpg", text: "Preciosota💘" }
    { img: "https://i.pinimg.com/736x/d6/31/53/d631535ebc1477ed0cbbba886c57fba3.jpg", text: "Divina!😳" }


];

const palabrasData = [
  "Hermosa ✨", "Mi Todo", "Mi Vida 💖", "Perfecta 🌸", "Solo Tú", 
  "Mi Universo 🌌", "Preciosa 💕", "Luz de mi vida", "Mi Reina 👑", "Eterna"
];

// --- UI Y ESTADOS ---
const uiContainer = document.getElementById('ui-container');
const btnSi = document.getElementById('btn-si');
const btnNo = document.getElementById('btn-no');
const musica = document.getElementById('musica');
const narrativa = document.getElementById('narrativa');
const htmlOrbitContainer = document.getElementById('html-orbit-container');
const btnRecuerdos = document.getElementById('btn-recuerdos');
const galeriaCartas = document.getElementById('galeria-cartas');
const cerrarCarta = document.getElementById('cerrar-carta');

let isFlying = false, showMagic = false, isExploding = false;
let heartPulseMultiplier = 1.0, mouseX = 0, mouseY = 0;
const isMobile = /Mobi|Android|iPhone/i.test(navigator.userAgent);

// 🔥 LÓGICA DEL BOTÓN QUE HUYE 🔥
const escaparBtn = () => {
  const x = Math.random() * (window.innerWidth - 100);
  const y = Math.random() * (window.innerHeight - 50);
  btnNo.style.position = 'fixed';
  btnNo.style.left = `${x}px`;
  btnNo.style.top = `${y}px`;
};

btnNo.addEventListener('mouseover', escaparBtn);
btnNo.addEventListener('touchstart', (e) => {
  e.preventDefault(); 
  escaparBtn();
});

// 🔥 SECUENCIA CINEMÁTICA AL DECIR QUE SÍ
function showCinematicText() {
  setTimeout(() => { narrativa.innerHTML = "Sabía que dirías que sí..."; narrativa.style.opacity = 1; }, 2000);
  setTimeout(() => { narrativa.style.opacity = 0; }, 6000);
  setTimeout(() => { narrativa.innerHTML = "Porque tú ya eras todo mi universo..."; narrativa.style.opacity = 1; }, 8000);
  setTimeout(() => { narrativa.style.opacity = 0; }, 12000);
  setTimeout(() => { narrativa.innerHTML = "Te amo, <br><span class='destaque'>Niña Génesis 💖</span>"; narrativa.style.opacity = 1; }, 14000);
  setTimeout(() => { 
    narrativa.style.opacity = 0; 
    setTimeout(() => { showMagic = true; setTimeout(() => { btnRecuerdos.style.display = 'block'; }, 2000); }, 1500); 
  }, 18000);
}

btnSi.addEventListener('click', () => {
  uiContainer.style.opacity = 0; setTimeout(() => uiContainer.style.display = 'none', 1500);
  musica.play().catch(()=>{}); isFlying = true; setTimeout(showCinematicText, 3500);
});

btnRecuerdos.addEventListener('click', () => {
  galeriaCartas.style.display = 'flex'; setTimeout(() => galeriaCartas.style.opacity = 1, 50);
});
cerrarCarta.addEventListener('click', () => {
  galeriaCartas.style.opacity = 0;
  setTimeout(() => { galeriaCartas.style.display = 'none'; explodeHeart(); }, 500);
});

// --- INTERACTIVIDAD: MOUSE TRAIL 2D ---
const trailCanvas = document.getElementById('trail-canvas');
const tctx = trailCanvas.getContext('2d');
trailCanvas.width = innerWidth; trailCanvas.height = innerHeight;
const trailParticles = [];
const florColors = ['#ff4d88', '#ffcc00', '#ff77aa', '#ffffff'];

function createTrail(x, y) {
  for(let i=0; i<3; i++) {
    trailParticles.push({ x: x, y: y, vx: (Math.random()-0.5)*2, vy: (Math.random()-0.5)*2 - 1, life: 1.0, size: Math.random()*4 + 1, color: florColors[Math.floor(Math.random() * florColors.length)] });
  }
}
function createBurst(x, y) {
  for(let i=0; i<40; i++) {
    trailParticles.push({ x: x, y: y, vx: (Math.random()-0.5)*15, vy: (Math.random()-0.5)*15, life: 1.0, size: Math.random()*6 + 2, color: florColors[Math.floor(Math.random() * florColors.length)] });
  }
}

window.addEventListener('mousemove', (e) => { createTrail(e.clientX, e.clientY); mouseX = (e.clientX / innerWidth) * 2 - 1; mouseY = -(e.clientY / innerHeight) * 2 + 1; });
window.addEventListener('touchmove', (e) => { createTrail(e.touches[0].clientX, e.touches[0].clientY); mouseX = (e.touches[0].clientX / innerWidth) * 2 - 1; mouseY = -(e.touches[0].clientY / innerHeight) * 2 + 1; });

window.addEventListener('click', (e) => {
  if (e.target.tagName === 'BUTTON' || e.target.closest('.floating-photo')) return;
  if(showMagic) { createBurst(e.clientX, e.clientY); heartPulseMultiplier = 1.8; }
});

function drawTrail() {
  tctx.clearRect(0, 0, trailCanvas.width, trailCanvas.height);
  tctx.globalCompositeOperation = 'lighter';
  for(let i=0; i<trailParticles.length; i++) {
    let p = trailParticles[i]; p.x += p.vx; p.y += p.vy; p.life -= 0.02;
    if(p.life <= 0) { trailParticles.splice(i, 1); i--; continue; }
    tctx.beginPath(); tctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2); tctx.fillStyle = p.color; tctx.globalAlpha = p.life; tctx.fill();
  }
  tctx.globalAlpha = 1;
}

// --- MOTOR 3D ---
const canvas = document.getElementById('epic-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: false, powerPreference: "high-performance" });
renderer.setSize(innerWidth, innerHeight); renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.toneMapping = THREE.ACESFilmicToneMapping; renderer.toneMappingExposure = 1.2; 

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x020005, 0.002); 

const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 2000);
camera.position.set(0, 0, 500); 

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.05; controls.enabled = false; 

// BLOOM MEDIO
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 1.5, 0.5, 0.2);
composer.addPass(bloomPass);

// LUCES PARA LAS FLORES Y ESCENA
const ambientLight = new THREE.AmbientLight(0x442244, 1.5); 
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0xffddaa, 2.0); 
dirLight.position.set(20, 50, 20);
scene.add(dirLight);

// EL PORTAL
const portalGroup = new THREE.Group();
portalGroup.position.set(0, 0, 250); 
const ring1 = new THREE.Mesh(new THREE.TorusGeometry(40, 0.5, 16, 100), new THREE.MeshBasicMaterial({ color: 0xff0055, wireframe: true, transparent: true, opacity: 0.6 }));
const ring2 = new THREE.Mesh(new THREE.TorusGeometry(38, 2, 16, 100), new THREE.MeshBasicMaterial({ color: 0xff88aa, wireframe: true, transparent: true, opacity: 0.3 }));
ring2.rotation.x = Math.PI / 2;
portalGroup.add(ring1); portalGroup.add(ring2);
scene.add(portalGroup);

// CORAZÓN CENTRAL DE PARTÍCULAS
const heartGroup = new THREE.Group();
heartGroup.position.set(0, 0, 0); 
function heartEquation(t) { return { x: 16*Math.pow(Math.sin(t),3), y: 13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t) }; }
const particleCount = isMobile ? 3500 : 7000;
const hP = new Float32Array(particleCount * 3), hC = new Float32Array(particleCount * 3);
const colorObj = new THREE.Color();
for(let i=0; i<particleCount; i++) {
  const i3 = i * 3, t = Math.random() * Math.PI * 2, s = 0.45 + Math.random() * 0.55, p = heartEquation(t);
  hP[i3] = p.x * s * 1.8; hP[i3+1] = p.y * s * 1.8; hP[i3+2] = (Math.random() - 0.5) * 15; 
  const d = Math.sqrt(p.x*p.x + p.y*p.y) / 22;
  colorObj.setHSL(0.94 - d * 0.05, 0.95, Math.max(d < 0.25 ? 0.70 - d*0.5 : 0.50 - d*0.1, 0.30));
  hC[i3] = colorObj.r; hC[i3+1] = colorObj.g; hC[i3+2] = colorObj.b;
}
const heartGeo = new THREE.BufferGeometry();
heartGeo.setAttribute('position', new THREE.BufferAttribute(hP, 3));
heartGeo.setAttribute('color', new THREE.BufferAttribute(hC, 3));
const particleHeart = new THREE.Points(heartGeo, new THREE.PointsMaterial({ size: isMobile ? 1.5 : 2.0, vertexColors: true, blending: THREE.AdditiveBlending, transparent: true, depthWrite: false, opacity: 0.85 }));
heartGroup.add(particleHeart);

// ONDA EXPANSIVA EN FORMA DE CORAZÓN
const swPoints = [];
for (let t = 0; t <= Math.PI * 2; t += 0.05) {
    const p = heartEquation(t);
    swPoints.push(new THREE.Vector3(p.x * 2.2, p.y * 2.2, 0));
}
const swCurve = new THREE.CatmullRomCurve3(swPoints, true);
const shockwaveGeo = new THREE.TubeGeometry(swCurve, 100, 0.6, 8, true);
const shockwaveMat = new THREE.MeshBasicMaterial({ color: 0xff0055, transparent: true, opacity: 0, blending: THREE.AdditiveBlending, depthWrite: false });
const shockwave = new THREE.Mesh(shockwaveGeo, shockwaveMat);
heartGroup.add(shockwave);

// HILOS DEL DESTINO 
const threadsGeo = new THREE.BufferGeometry();
const threadsPos = new Float32Array(recuerdosData.length * 6); 
threadsGeo.setAttribute('position', new THREE.BufferAttribute(threadsPos, 3));
const threadsMat = new THREE.LineBasicMaterial({ color: 0xff4d88, transparent: true, opacity: 0, blending: THREE.AdditiveBlending });
const threads = new THREE.LineSegments(threadsGeo, threadsMat);
heartGroup.add(threads);

// 🔥 EL BOSQUE DE TULIPANES 3D 🔥
const stemGeo = new THREE.CylinderGeometry(0.2, 0.2, 10, 4);
const stemMat = new THREE.MeshStandardMaterial({ color: 0x2d8a4e, roughness: 0.8 }); 
const leafGeo = new THREE.SphereGeometry(1, 6, 6);
const leafMat = new THREE.MeshStandardMaterial({ color: 0x3cb371, roughness: 0.9, side: THREE.DoubleSide });
const petalGeo = new THREE.SphereGeometry(1.2, 12, 12);
petalGeo.translate(0, 1.5, 0); 
const tulipColors = [0xff69b4, 0xff1493, 0xffa07a, 0xdb7093, 0xffc0cb, 0xff3366]; 

function createSolidTulip() {
  const group = new THREE.Group();
  const stem = new THREE.Mesh(stemGeo, stemMat);
  stem.position.y = 5; group.add(stem);

  const leaf = new THREE.Mesh(leafGeo, leafMat);
  leaf.scale.set(0.3, 3, 1); leaf.position.set(0.6, 3, 0); leaf.rotation.z = -0.4;
  group.add(leaf);

  const flowerGroup = new THREE.Group();
  flowerGroup.position.y = 10;
  const myColor = tulipColors[Math.floor(Math.random() * tulipColors.length)];
  const mat = new THREE.MeshStandardMaterial({ color: myColor, roughness: 0.6, side: THREE.DoubleSide });
  
  for(let i=0; i<6; i++) {
    const petal = new THREE.Mesh(petalGeo, mat);
    petal.scale.set(1, 1.5, 0.35); 
    const angle = (Math.PI * 2 / 6) * i;
    petal.rotation.y = angle; petal.rotation.x = 0.2; 
    flowerGroup.add(petal);
  }
  group.add(flowerGroup);
  return group;
}

// 500 Tulipanes (Optimizado)
const numTulips = isMobile ? 250 : 500;
const tulipGarden = [];
for(let i=0; i<numTulips; i++) {
  const tulip = createSolidTulip();
  const angle = Math.random() * Math.PI * 2;
  const radius = 40 + Math.random() * 140; 
  tulip.position.set(Math.cos(angle)*radius, -50 + (Math.random()-0.5)*20, Math.sin(angle)*radius);
  const s = 0.5 + Math.random()*0.7; tulip.scale.set(s, s, s);
  tulip.userData = { phaseX: Math.random() * Math.PI * 2, phaseZ: Math.random() * Math.PI * 2, speed: 0.5 + Math.random() * 0.5 };
  heartGroup.add(tulip);
  tulipGarden.push(tulip);
}

// PÉTALOS FLOTANTES
const fPetalsCount = isMobile ? 1500 : 3000;
const fPetalsGeo = new THREE.BufferGeometry();
const fPetalsPos = new Float32Array(fPetalsCount * 3), fPetalsCol = new Float32Array(fPetalsCount * 3);
for(let i=0; i<fPetalsCount; i++) {
  const r = 30 + Math.random() * 140; const theta = Math.random() * Math.PI * 2;
  fPetalsPos[i*3] = Math.cos(theta)*r; fPetalsPos[i*3+1] = -50 + Math.random()*120; fPetalsPos[i*3+2] = Math.sin(theta)*r;
  const c = new THREE.Color(tulipColors[Math.floor(Math.random() * tulipColors.length)]);
  fPetalsCol[i*3] = c.r; fPetalsCol[i*3+1] = c.g; fPetalsCol[i*3+2] = c.b;
}
fPetalsGeo.setAttribute('position', new THREE.BufferAttribute(fPetalsPos, 3));
fPetalsGeo.setAttribute('color', new THREE.BufferAttribute(fPetalsCol, 3));
const fPetalsMat = new THREE.PointsMaterial({ size: 1.5, vertexColors: true, transparent: true, opacity: 0.7, blending: THREE.AdditiveBlending, depthWrite: false });
const floatingPetalsSystem = new THREE.Points(fPetalsGeo, fPetalsMat);
heartGroup.add(floatingPetalsSystem);
scene.add(heartGroup);

// --- EL FONDO PROFUNDO ---
const starsGeo = new THREE.BufferGeometry();
const starsPos = new Float32Array(2000 * 3); 
for(let i=0; i<2000*3; i++) starsPos[i] = (Math.random() - 0.5) * 1200;
starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPos, 3));
const stars = new THREE.Points(starsGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 1.2, transparent: true, opacity: 0.4 }));
scene.add(stars);

const mwGeo = new THREE.BufferGeometry();
const mwCount = 4000; 
const mwPos = new Float32Array(mwCount * 3), mwCol = new Float32Array(mwCount * 3);
for(let i=0; i<mwCount; i++) {
  const radius = 500 + Math.random() * 300; 
  const theta = (Math.random() - 0.5) * Math.PI * 2; 
  const phi = Math.PI/2 + (Math.random() - 0.5) * 0.5; 
  let x = radius * Math.sin(phi) * Math.cos(theta), y = radius * Math.cos(phi) + (Math.random()-0.5)*150, z = radius * Math.sin(phi) * Math.sin(theta);
  const tx = x * Math.cos(0.5) - y * Math.sin(0.5), ty = x * Math.sin(0.5) + y * Math.cos(0.5);
  mwPos[i*3] = tx; mwPos[i*3+1] = ty; mwPos[i*3+2] = z;
  const mix = Math.random();
  if(mix < 0.3) colorObj.setHex(0x2a0088); else if(mix < 0.6) colorObj.setHex(0xff0055); else colorObj.setHex(0x8800ff); 
  mwCol[i*3] = colorObj.r; mwCol[i*3+1] = colorObj.g; mwCol[i*3+2] = colorObj.b;
}
mwGeo.setAttribute('position', new THREE.BufferAttribute(mwPos, 3));
mwGeo.setAttribute('color', new THREE.BufferAttribute(mwCol, 3));
const milkyWay = new THREE.Points(mwGeo, new THREE.PointsMaterial({size: 8, vertexColors: true, blending: THREE.AdditiveBlending, transparent: true, opacity: 0.15, depthWrite: false}));
scene.add(milkyWay);

const orbGeo = new THREE.BufferGeometry();
const orbPos = new Float32Array(150 * 3), orbPhase = new Float32Array(150);
for(let i=0; i<150; i++) {
   orbPos[i*3] = (Math.random() - 0.5) * 800; orbPos[i*3+1] = (Math.random() - 0.5) * 800; orbPos[i*3+2] = (Math.random() - 0.5) * 800;
   orbPhase[i] = Math.random() * Math.PI * 2;
}
orbGeo.setAttribute('position', new THREE.BufferAttribute(orbPos, 3));
orbGeo.setAttribute('phase', new THREE.BufferAttribute(orbPhase, 1));
const floatingOrbs = new THREE.Points(orbGeo, new THREE.PointsMaterial({color: 0xffaaaa, size: 6, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending, depthWrite: false}));
scene.add(floatingOrbs);

// EXPLOSIÓN FIREWORKS
const explosionGeo = new THREE.BufferGeometry();
const expCount = 1500;
const expPos = new Float32Array(expCount * 3), expCol = new Float32Array(expCount * 3), expVels = []; 
for(let i=0; i<expCount; i++) {
  expPos[i*3] = 0; expPos[i*3+1] = 0; expPos[i*3+2] = 0;
  const u = Math.random(), v = Math.random(), theta = u * 2.0 * Math.PI, phi = Math.acos(2.0 * v - 1.0), speed = 2 + Math.random() * 4;
  expVels.push(new THREE.Vector3(Math.sin(phi)*Math.cos(theta)*speed, Math.sin(phi)*Math.sin(theta)*speed, Math.cos(phi)*speed));
  colorObj.setHSL(0.85 + Math.random()*0.15, 1, 0.6); 
  expCol[i*3] = colorObj.r; expCol[i*3+1] = colorObj.g; expCol[i*3+2] = colorObj.b;
}
explosionGeo.setAttribute('position', new THREE.BufferAttribute(expPos, 3));
explosionGeo.setAttribute('color', new THREE.BufferAttribute(expCol, 3));
const explosionMat = new THREE.PointsMaterial({size: 2, vertexColors: true, blending: THREE.AdditiveBlending, transparent: true, opacity: 0});
const explosionSystem = new THREE.Points(explosionGeo, explosionMat);
scene.add(explosionSystem);

function explodeHeart() {
  isExploding = true; explosionMat.opacity = 1;
  const positions = explosionGeo.attributes.position.array;
  for(let i=0; i<expCount; i++) { positions[i*3]=0; positions[i*3+1]=0; positions[i*3+2]=0; }
}

// --- CREACIÓN DEL SISTEMA HTML ---
const shieldNodes = [];
const meteorNodes = [];

const shieldRadius = 75; 
for(let i=0; i<recuerdosData.length; i++) {
  const el = document.createElement('div');
  el.className = 'floating-photo';
  el.innerHTML = `<img src="${recuerdosData[i].img}" alt=""><p>${recuerdosData[i].text}</p>`;
  htmlOrbitContainer.appendChild(el);
  const dummyObj = new THREE.Object3D(); heartGroup.add(dummyObj);
  
  let isHovered = false;
  el.addEventListener('mouseenter', () => { isHovered = true; el.classList.add('hovered'); });
  el.addEventListener('mouseleave', () => { isHovered = false; el.classList.remove('hovered'); });
  el.addEventListener('touchstart', () => { isHovered = true; el.classList.add('hovered'); }, {passive: true});
  el.addEventListener('touchend', () => { isHovered = false; el.classList.remove('hovered'); });

  shieldNodes.push({
    el: el, dummy: dummyObj, currentOpacity: 0,
    get isHovered() { return isHovered; }, 
    theta: (i / recuerdosData.length) * Math.PI * 2, 
    phi: Math.acos(2 * (i+0.5)/recuerdosData.length - 1), 
    dTheta: (Math.random() - 0.5) * 0.015, 
    dPhi: (Math.random() - 0.5) * 0.015  
  });
}

// METEORITOS TRANQUILOS
for(let i=0; i<palabrasData.length; i++) {
  const el = document.createElement('div');
  el.className = 'meteor-word';
  el.innerText = palabrasData[i];
  htmlOrbitContainer.appendChild(el);
  const dummyObj = new THREE.Object3D(); scene.add(dummyObj); 
  
  meteorNodes.push({
    el: el, dummy: dummyObj,
    reset: function() {
      this.dummy.position.set((Math.random()-0.5)*800, (Math.random()-0.5)*400, -800 - Math.random()*300);
      // 🔥 Velocidad muy baja (viaje relajante)
      this.vel = new THREE.Vector3((Math.random()-0.5)*0.8, (Math.random()-0.5)*0.8, 2.5 + Math.random()*2);
      this.active = false;
    }
  });
  meteorNodes[i].reset();
}

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight); composer.setSize(innerWidth, innerHeight);
  trailCanvas.width = innerWidth; trailCanvas.height = innerHeight;
});

// --- BUCLE DE ANIMACIÓN ---
const clock = new THREE.Clock();

function loop() {
  requestAnimationFrame(loop);
  const time = clock.getElapsedTime();

  drawTrail();

  ring1.rotation.z += 0.01; ring1.rotation.y = Math.sin(time * 0.5) * 0.5;
  ring2.rotation.z -= 0.015; ring2.rotation.x = Math.sin(time * 0.8) * 0.5;
  
  heartGroup.rotation.y = time * 0.15 + (mouseX * 0.3); 
  heartGroup.rotation.x = mouseY * 0.2; 
  heartGroup.position.y = Math.sin(time * 1.5) * 2;   
  
  milkyWay.rotation.y = time * 0.02; 

  tulipGarden.forEach((tulip) => {
    tulip.rotation.z = Math.sin(time * tulip.userData.speed + tulip.userData.phaseZ) * 0.1;
    tulip.rotation.x = Math.sin(time * tulip.userData.speed + tulip.userData.phaseX) * 0.1;
  });

  floatingPetalsSystem.rotation.y = time * 0.08;
  const fPos = floatingPetalsSystem.geometry.attributes.position.array;
  for(let i=0; i<fPetalsCount; i++) {
    fPos[i*3+1] += 0.15 + Math.random()*0.1; 
    if(fPos[i*3+1] > 70) fPos[i*3+1] = -50 - Math.random() * 20; 
  }
  floatingPetalsSystem.geometry.attributes.position.needsUpdate = true;
  
  heartPulseMultiplier += (1.0 - heartPulseMultiplier) * 0.1; 
  const pulseCycle = (time * 1.5) % 2; 
  const beat = (1 + Math.sin(time * Math.PI * 1.5) * 0.05) * heartPulseMultiplier;
  particleHeart.scale.set(beat, beat, beat);
  
  shockwave.scale.set(0.5 + pulseCycle*1.2, 0.5 + pulseCycle*1.2, 0.5 + pulseCycle*1.2);
  shockwave.material.opacity = Math.max(0, 0.4 - pulseCycle*0.2); 

  if(isExploding && explosionMat.opacity > 0) {
    const positions = explosionGeo.attributes.position.array;
    for(let i=0; i<expCount; i++) {
      positions[i*3] += expVels[i].x; positions[i*3+1] += expVels[i].y; positions[i*3+2] += expVels[i].z;
    }
    explosionGeo.attributes.position.needsUpdate = true;
    explosionMat.opacity -= 0.015; 
  }

  if (isFlying) {
    camera.position.z = THREE.MathUtils.lerp(camera.position.z, 160, 0.025); 
    if (camera.position.z < 240) portalGroup.scale.multiplyScalar(0.9);
    if (camera.position.z < 170) {
      controls.enabled = true; controls.autoRotate = true; controls.autoRotateSpeed = 0.5; 
    }
  }

  if (showMagic) {
    threadsMat.opacity = 0.15 + Math.sin(time * 4) * 0.1; 
    const tPositions = threadsGeo.attributes.position.array;

    shieldNodes.forEach((node, i) => {
      const speedControl = node.isHovered ? 0.2 : 1.0;
      node.theta += node.dTheta * speedControl;
      node.phi += node.dPhi * speedControl;
      
      node.dummy.position.x = shieldRadius * Math.sin(node.phi) * Math.cos(node.theta);
      node.dummy.position.y = shieldRadius * Math.cos(node.phi);
      node.dummy.position.z = shieldRadius * Math.sin(node.phi) * Math.sin(node.theta);

      tPositions[i*6] = 0; tPositions[i*6+1] = 0; tPositions[i*6+2] = 0;
      tPositions[i*6+3] = node.dummy.position.x; 
      tPositions[i*6+4] = node.dummy.position.y; 
      tPositions[i*6+5] = node.dummy.position.z;

      const vector = new THREE.Vector3();
      vector.setFromMatrixPosition(node.dummy.matrixWorld);
      vector.project(camera);

      if (node.currentOpacity < 1) node.currentOpacity += 0.02; 

      // 🔥 MATEMÁTICA DE PROFUNDIDAD MEJORADA (Se achican menos)
      let hoverScaleMult = node.isHovered ? 1.5 : 1.0;
      let depthScale = Math.max(0.4, 1 - vector.z * 0.4) * hoverScaleMult; // Antes era 0.6, ahora es 0.4 (las hace más grandes atrás)
      
      // 🔥 OPACIDAD MEJORADA (Se desvanecen menos)
      let depthOpacity = vector.z > 0.95 ? 0.4 : 1.0; 
      
      if (node.isHovered) depthOpacity = 1.0; 

      node.el.style.opacity = node.currentOpacity * depthOpacity;
      node.el.style.left = (vector.x * 0.5 + 0.5) * innerWidth + 'px';
      node.el.style.top = (-(vector.y * 0.5) + 0.5) * innerHeight + 'px';
      node.el.style.transform = `translate(-50%, -50%) scale(${depthScale})`;
      
      if (!node.isHovered) node.el.style.zIndex = Math.round((1 - vector.z) * 1000);
    });
    threadsGeo.attributes.position.needsUpdate = true; 

    // 🔥 METEORITOS TRANQUILOS (Aparición suavizada)
    meteorNodes.forEach((node) => {
      if(!node.active && Math.random() < 0.02) node.active = true;
      if(!node.active) return;

      node.dummy.position.add(node.vel);

      const vector = new THREE.Vector3();
      vector.setFromMatrixPosition(node.dummy.matrixWorld);
      vector.project(camera);

      if(node.dummy.position.z > 250 || vector.z > 1) {
        node.reset();
        node.el.style.opacity = 0;
      } else {
        let size = Math.max(0.1, 1 - vector.z);
        // Suavizamos el fade in para que aparezcan elegante y no de golpe
        node.el.style.opacity = Math.min(1.0, (node.dummy.position.z + 800) / 400); 
        node.el.style.left = (vector.x * 0.5 + 0.5) * innerWidth + 'px';
        node.el.style.top = (-(vector.y * 0.5) + 0.5) * innerHeight + 'px';
        node.el.style.transform = `translate(-50%, -50%) scale(${size})`;
      }
    });
  }

  if (controls.enabled) controls.update();
  composer.render();
}
loop();
</script>
</body>
</html>
